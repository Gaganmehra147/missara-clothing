<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Missara Clothing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      max-width: 450px;
      margin: 60px auto;
      padding: 40px;
      background: var(--bg-white);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid var(--border-light);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-header h2 {
      font-family: var(--font-heading);
      color: var(--text-dark);
      font-size: 2rem;
      margin-bottom: 10px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-dark);
      font-weight: 500;
    }
    
    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary-pink);
    }
    
    .btn-auth {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-pink);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    
    .btn-auth:hover {
      background-color: #d12255;
    }
    
    .auth-error {
      color: #e74c3c;
      background: #fadbd8;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }

    .auth-success {
      color: #155724;
      background: #d4edda;
      padding: 15px;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="top-strip">
      <div class="scrolling-text">
        <span>🌸 FREE SHIPPING ACROSS INDIA | EASY RETURNS 🌸</span>
        <span>✨ EXQUISITE ETHNIC LADIES WEAR REVAMP ✨</span>
        <span>💖 USE CODE <strong>MISSARA10</strong> FOR 10% INSTANT DISCOUNT 💖</span>
      </div>
    </div>
    
    <div class="main-header">
      <div class="header-left">
        <a href="index.html" class="logo">MISSARA<span class="dot">.</span></a>
      </div>
      <div class="header-right">
        <a href="index.html" class="icon-link"><i class="fas fa-home"></i></a>
      </div>
    </div>
  </header>

  <main style="background-color: var(--secondary-pink); min-height: calc(100vh - 120px); padding: 40px 20px; display: flex; align-items: center;">
    <div class="auth-container">
      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your new password below.</p>
      </div>
      
      <div id="error-message" class="auth-error"></div>
      <div id="success-message" class="auth-success">
        Password successfully reset! <br><br>
        <a href="login.html" style="color: #155724; font-weight: bold; text-decoration: underline;">Click here to log in</a>
      </div>
      
      <form id="reset-form" class="auth-form" style="display: block;">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-control" required placeholder="Enter new password" minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" required placeholder="Confirm new password" minlength="6">
        </div>
        <button type="submit" class="btn-auth">Update Password</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Missara Clothing. All Rights Reserved.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
        document.getElementById('error-message').textContent = 'Invalid or missing reset token.';
        document.getElementById('error-message').style.display = 'block';
        document.getElementById('reset-form').style.display = 'none';
      }
      
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const btn = e.target.querySelector('button');
        const errDiv = document.getElementById('error-message');
        
        errDiv.style.display = 'none';
        
        if (newPassword !== confirmPassword) {
          errDiv.textContent = 'Passwords do not match.';
          errDiv.style.display = 'block';
          return;
        }
        
        try {
          btn.textContent = 'Updating...';
          btn.disabled = true;
          
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
          });
          
          const data = await response.json();
          
          if (data.success) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
          } else {
            errDiv.textContent = data.message || 'Failed to reset password.';
            errDiv.style.display = 'block';
            btn.textContent = 'Update Password';
            btn.disabled = false;
          }
        } catch (error) {
          errDiv.textContent = 'Network error. Please try again.';
          errDiv.style.display = 'block';
          btn.textContent = 'Update Password';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
